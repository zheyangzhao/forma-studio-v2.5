/* ── v2.5: Prompt Gallery loader（DOM-based，保持單檔特性）── */
/* 讀 <script id="forma-gallery"> 區塊；空或解析失敗 → 回退 v1.0 行為 */
const FORMA_GALLERY = (() => {
  try {
    const el = document.getElementById('forma-gallery');

    return (data && data.total_count > 0) ? data : null;
  } catch (e) {
    console.warn('[Forma Studio] prompt gallery 載入失敗，已回退 v1.0 行為', e);
    return null;
  }
})();
const ENABLE_PROMPT_GALLERY = !!FORMA_GALLERY;
